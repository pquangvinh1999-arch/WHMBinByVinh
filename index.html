<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInventory AI - Global WMS Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-main: #f1f5f9; 
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.6);
            --primary-blue: #2563eb;
            --accent-purple: #7c3aed;
            --success-green: #059669;
            --error-red: #dc2626;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.05);
            --shadow-strong: 0 20px 40px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.05) 0%, transparent 50%), radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
            min-height: 100vh; padding: clamp(15px, 3vw, 30px); color: var(--text-main);
        }

        header {
            position: sticky; top: 0; z-index: 1000; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px;
            margin-bottom: 30px; padding: 15px 25px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft);
        }

        .logo { font-size: clamp(18px, 4vw, 24px); font-weight: 800; display: flex; align-items: center; gap: 12px; color: var(--primary-blue); }

        .search-ai-container { position: relative; width: clamp(200px, 30vw, 450px); }
        .search-ai-container input {
            width: 100%; padding: 12px 20px 12px 45px; background: rgba(255, 255, 255, 0.6);
            border: 1px solid #e2e8f0; border-radius: 15px; color: var(--text-main); outline: none; transition: var(--transition);
        }
        .search-ai-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-blue); }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .btn {
            padding: 12px 20px; border: none; border-radius: 14px; cursor: pointer; font-weight: 700;
            display: flex; align-items: center; gap: 10px; transition: var(--transition); color: white; font-size: 13px;
            text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden;
        }

        .btn-export { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); }
        .btn-rack { background: linear-gradient(135deg, #0284c7, #38bdf8); box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3); }
        .btn-bin { background: linear-gradient(135deg, #6d28d9, #818cf8); box-shadow: 0 4px 15px rgba(129, 140, 248, 0.3); }
        .btn:hover { transform: translateY(-3px) scale(1.05); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

        #kpiCard {
            display: none; margin-bottom: 30px; padding: 20px; background: white; border-radius: 24px;
            border-left: 8px solid var(--primary-blue); text-align: center; box-shadow: var(--shadow-soft); animation: popIn 0.4s ease;
        }
        .kpi-value { font-size: 32px; font-weight: 800; color: var(--primary-blue); font-family: 'JetBrains Mono', monospace; }

        .warehouse-floor { display: flex; flex-direction: column; gap: 40px; }
        .rack-container {
            background: var(--glass-bg); backdrop-filter: blur(10px); border-radius: 30px; padding: clamp(15px, 4vw, 30px);
            border: 1px solid var(--glass-border); position: relative; animation: slideUp 0.6s ease; box-shadow: var(--shadow-soft);
        }

        .rack-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .rack-title { font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 12px; color: var(--text-main); }
        .rack-title span { background: var(--primary-blue); color: white; padding: 2px 12px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; }
        .btn-delete-rack { opacity: 0; color: var(--text-dim); cursor: pointer; transition: var(--transition); font-size: 13px; }
        .rack-container:hover .btn-delete-rack { opacity: 1; }

        .bins-grid { display: flex; flex-direction: column; gap: 30px; }
        .bin-group { background: rgba(255, 255, 255, 0.5); border-radius: 20px; padding: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .bin-label { font-size: 12px; font-weight: 800; color: var(--primary-blue); margin-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .levels-row { display: flex; flex-wrap: wrap; gap: 15px; }

        .bin-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 18px; padding: 15px;
            width: clamp(260px, 22vw, 320px); transition: var(--transition); cursor: pointer;
            position: relative; box-shadow: var(--shadow-soft); animation: popIn 0.3s ease;
        }
        .bin-card:hover { transform: translateY(-5px); border-color: var(--primary-blue); box-shadow: var(--shadow-strong); }
        .bin-card.filtered-item { border-color: var(--success-green); box-shadow: 0 0 20px rgba(5, 150, 105, 0.2); animation: highlightPulse 1.5s infinite; }

        @keyframes highlightPulse { 0% { border-color: var(--success-green); } 50% { border-color: var(--primary-blue); } 100% { border-color: var(--success-green); } }

        .bin-card img { width: 100%; height: 90px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; background: #f8fafc; }
        .bin-code { color: var(--primary-blue); font-weight: 800; font-family: 'JetBrains Mono', monospace; font-size: 14px; margin-bottom: 10px; display: block; }
        .priority-data { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 6px 0; border-bottom: 1px solid #f1f5f9; }
        .item-label { font-size: 12px; color: var(--text-dim); }
        .item-value { font-size: 15px; font-weight: 700; color: var(--text-main); font-family: 'JetBrains Mono', monospace; }
        .qty-value { font-size: 18px; font-weight: 800; color: var(--success-green); font-family: 'JetBrains Mono', monospace; }
        .bin-footer { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-dim); background: #f8fafc; padding: 6px 10px; border-radius: 8px; margin-top: 10px; }

        .action-hub { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; z-index: 5; }
        .bin-card:hover .action-hub { opacity: 1; }
        .hub-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: white; cursor: pointer; font-size: 12px; transition: 0.2s; color: var(--text-dim); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hub-btn:hover { background: var(--primary-blue); color: white; }

        .action-panel {
            position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: white;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1); z-index: 3000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid #e2e8f0;
        }
        .action-panel.active { right: 0; }

        .dispatch-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .btn-dispatch { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: var(--transition); font-size: 14px; }
        .btn-partial { background: var(--primary-blue); color: white; }
        .btn-full { background: var(--error-red); color: white; }
        .btn-dispatch:hover { transform: scale(1.02); filter: brightness(1.1); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 4000; }
        .modal { background: white; padding: 30px; border-radius: 24px; width: clamp(300px, 90vw, 600px); box-shadow: var(--shadow-strong); animation: popIn 0.4s ease; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .form-group label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
        .form-group input, .form-group select { padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; color: var(--text-main); }

        .copyright-footer { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--text-dim); opacity: 0.4; transition: var(--transition); cursor: default; text-transform: uppercase; letter-spacing: 1px; }
        .copyright-footer:hover { opacity: 1; color: var(--primary-blue); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        @media (max-width: 768px) { header { justify-content: center; text-align: center; } .search-ai-container { width: 100%; } .bin-card { width: 100%; } .action-panel { width: 100%; right: -100%; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-warehouse"></i> SmartInventory <span style="font-weight: 300; font-size: 14px; color: var(--text-dim);">| Global WMS Standard</span>
        </div>
        <div class="search-ai-container">
            <i class="fas fa-wand-magic-sparkles"></i>
            <input type="text" id="aiFilter" placeholder="AI Search (SKU, Tag, PO...)" onkeyup="debounceFilter()">
        </div>
        <div class="btn-group">
            <button class="btn btn-export" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Export Report</button>
            <button class="btn btn-rack" onclick="openModal('rackModal')"><i class="fas fa-plus"></i> Create Rack</button>
            <button class="btn btn-bin" onclick="openModal('binModal')"><i class="fas fa-layer-group"></i> Putaway Stock</button>
        </div>
    </header>

    <div id="kpiCard">
        <div style="color: var(--text-dim); font-size: 14px; margin-bottom: 5px;">Real-time Inventory Summary</div>
        <div class="kpi-value" id="kpiSum">0 UNITS</div>
    </div>

    <div class="warehouse-floor" id="warehouseFloor"></div>

    <div class="action-panel" id="actionPanel">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 id="panelTitle" style="color:var(--primary-blue)">Bin Actions</h2>
            <i class="fas fa-times" style="cursor:pointer; color:var(--text-dim)" onclick="closeActionPanel()"></i>
        </div>
        <hr style="border:0; border-top:1px solid #eee">
        <div id="panelContent"></div>
    </div>

    <div class="modal-overlay" id="rackModal">
        <div class="modal">
            <h2><i class="fas fa-map-marker-alt"></i> Create Storage Rack</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Rack Identification (ID)</label>
                    <input type="text" id="rackNameInput" placeholder="e.g. 22">
                </div>
                <div class="form-group">
                    <label>Storage Type</label>
                    <select id="rackTypeInput">
                        <option value="Rack">Pallet Rack (Kệ)</option>
                        <option value="Floor">Floor Storage (Sàn)</option>
                        <option value="Row">Linear Row (Hàng)</option>
                    </select>
                </div>
            </div>
            <div class="btn-group" style="justify-content: flex-end; margin-top:20px;">
                <button class="btn" style="background:#eee; color:#666" onclick="closeModal('rackModal')">Cancel</button>
                <button class="btn btn-rack" onclick="addRack()">Confirm Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="binModal">
        <div class="modal">
            <h2><i class="fas fa-layer-group"></i> Putaway New Stock</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Target Storage Rack</label>
                    <select id="rackSelect"></select>
                </div>
                <div class="form-group">
                    <label>Bin Location ID (Rack-Slot-Level)</label>
                    <input type="text" id="binCodeInput" list="existingBins" placeholder="22-01-01">
                    <datalist id="existingBins"></datalist>
                </div>
                <div class="form-group">
                    <label>Tag ID / Serial</label>
                    <input type="text" id="tagIdInput">
                </div>
                <div class="form-group">
                    <label>SKU / Item Code</label>
                    <input type="text" id="itemCodeInput">
                </div>
                <div class="form-group">
                    <label>Inventory Quantity</label>
                    <input type="number" id="qtyInput">
                </div>
                <div class="form-group">
                    <label>Box / Package ID</label>
                    <input type="text" id="boxInput">
                </div>
                <div class="form-group">
                    <label>PO Number (Purchase Order)</label>
                    <input type="text" id="purOrderInput">
                </div>
                <div class="form-group">
                    <label>Container ID</label>
                    <input type="text" id="contInput">
                </div>
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label>Item Photo (Auto-Sync to Cloud)</label>
                <input type="file" id="imageInput" accept="image/*" capture="environment">
            </div>
            <div class="btn-group" style="justify-content: flex-end; margin-top:20px;">
                <button class="btn" style="background:#eee; color:#666" onclick="closeModal('binModal')">Cancel</button>
                <button class="btn btn-bin" onclick="addBin()">Execute Putaway</button>
            </div>
        </div>
    </div>

    <div class="copyright-footer">
        &copy; Architected & Engineered by Vinh | Global WMS Standard Framework
    </div>

    <script>
        const SUPABASE_URL = 'https://xsgvhxsfsaelaqnjrsvv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzZ3ZoeHNmc2FlbGFxbmpyc3Z2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTgxOTEsImV4cCI6MjA5MzY5NDE5MX0.7-qk28hMkm8VeOsaWClbW-FHefcQA2kFWuksFPSLDog';
        
        let supabaseClient = null;
        try {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Supabase Init Error:", e);
        }

        let warehouseData = {}; 
        let usedBins = new Set();
        let filterTimeout = null;

        async function initApp() {
            try {
                if (!supabaseClient) throw new Error("Supabase client not initialized");
                const { data, error } = await supabaseClient.from('TembacBin').select('*');
                if (error) throw error;
                localStorage.setItem('wms_mirror_cache', JSON.stringify(data));
                processData(data);
            } catch (err) {
                console.error("Loading Error:", err);
                const cachedData = JSON.parse(localStorage.getItem('wms_mirror_cache'));
                if (cachedData) processData(cachedData);
                else alert("Connection Error. Please check Supabase.");
            }
        }

        function processData(data) {
            warehouseData = {};
            usedBins.clear();
            data.forEach(item => {
                const binValue = item.Bin || '00-00-00';
                const parts = binValue.split('-');
                const rackId = parts[0] || 'Unknown';
                const binNum = parts[1] || '00';
                const levelNum = parts[2] || '01';

                if (!warehouseData[rackId]) warehouseData[rackId] = { type: 'Rack', bins: {} };
                if (!warehouseData[rackId].bins[binNum]) warehouseData[rackId].bins[binNum] = { levels: {} };
                if (!warehouseData[rackId].bins[binNum].levels[levelNum]) warehouseData[rackId].bins[binNum].levels[levelNum] = [];
                
                warehouseData[rackId].bins[binNum].levels[levelNum].push({
                    id: item.id, fullCode: item.Bin, tagId: item.TAG_ID, itemCode: item.Item_Code,
                    qty: item.Qty, box: item.Box, purOrder: item.Pur_order, cont: item.Cont, image: item.image_url
                });
                usedBins.add(item.Bin);
            });
            renderWarehouse();
            updateBinSuggestions();
        }

        async function uploadImageToCloud(file) {
            if (!supabaseClient) return null;
            const fileName = `${Date.now()}_${file.name}`;
            try {
                const { data, error } = await supabaseClient.storage.from('inventory-images').upload(`items/${fileName}`, file);
                if (error) throw error;
                const { data: publicUrlData } = supabaseClient.storage.from('inventory-images').getPublicUrl(`items/${fileName}`);
                return publicUrlData.publicUrl;
            } catch (e) {
                console.error("Upload failed:", e);
                return null;
            }
        }

        async function syncToSupabase(item) {
            if (!supabaseClient) return;
            await supabaseClient.from('TembacBin').upsert({
                id: item.id, Bin: item.fullCode, TAG_ID: item.tagId, Item_Code: item.itemCode,
                Qty: item.qty, Box: item.box, Pur_order: item.purOrder, Cont: item.cont, image_url: item.image
            });
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if(id === 'binModal') updateRackSelect();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function updateRackSelect() {
            const select = document.getElementById('rackSelect');
            select.innerHTML = '';
            Object.keys(warehouseData).forEach(rack => {
                select.innerHTML += `<option value="${rack}">${warehouseData[rack].type} ${rack}</option>`;
            });
        }

        function addRack() {
            const name = document.getElementById('rackNameInput').value;
            const type = document.getElementById('rackTypeInput').value;
            if(!name) return alert("Required: Rack ID");
            warehouseData[name] = { type: type, bins: {} };
            renderWarehouse();
            document.getElementById('rackNameInput').value = '';
            closeModal('rackModal');
        }

        function deleteRack(rackId) {
            const password = prompt("Security Verification: Enter Password");
            if(password === '123456') {
                delete warehouseData[rackId];
                renderWarehouse();
            }
        }

        async function addBin() {
            const rackId = document.getElementById('rackSelect').value;
            const fullCode = document.getElementById('binCodeInput').value;
            if(!rackId || !fullCode) return alert("Missing Mandatory Data");
            const parts = fullCode.split('-');
            const binNum = parts[1] || '00';
            const levelNum = parts[2] || '01';
            const imageFile = document.getElementById('imageInput').files[0];
            let imageUrl = 'https://via.placeholder.com/150x100?text=No+Image';
            if(imageFile) imageUrl = await uploadImageToCloud(imageFile);

            // FIX: Create a clean item object WITHOUT 'id' to let Supabase handle auto-increment
            const itemForSupabase = {
                Bin: fullCode,
                TAG_ID: document.getElementById('tagIdInput').value,
                Item_Code: document.getElementById('itemCodeInput').value,
                Qty: parseInt(document.getElementById('qtyInput').value) || 0,
                Box: document.getElementById('boxInput').value,
                Pur_order: document.getElementById('purOrderInput').value,
                Cont: document.getElementById('contInput').value,
                image_url: imageUrl
            };

            try {
                // 1. Insert into Supabase and get the REAL ID back
                const { data, error } = await supabaseClient
                    .from('TembacBin')
                    .insert([itemForSupabase])
                    .select('id')
                    .single();

                if (error) throw error;

                // 2. Use the REAL ID from Supabase for local state
                const finalItem = {
                    id: data.id,
                    fullCode,
                    tagId: itemForSupabase.TAG_ID,
                    itemCode: itemForSupabase.Item_Code,
                    qty: itemForSupabase.Qty,
                    box: itemForSupabase.Box,
                    purOrder: itemForSupabase.Pur_order,
                    cont: itemForSupabase.Cont,
                    image: imageUrl
                };

                if (!warehouseData[rackId].bins[binNum]) warehouseData[rackId].bins[binNum] = { levels: {} };
                if (!warehouseData[rackId].bins[binNum].levels[levelNum]) warehouseData[rackId].bins[binNum].levels[levelNum] = [];
                warehouseData[rackId].bins[binNum].levels[levelNum].push(finalItem);
                
                usedBins.add(fullCode);
                updateBinSuggestions();
                renderWarehouse();
                closeModal('binModal');
            } catch (err) {
                console.error("Add Bin Error:", err);
                alert("Database Error: " + err.message);
            }
        }

        function updateBinSuggestions() {
            const datalist = document.getElementById('existingBins');
            datalist.innerHTML = '';
            usedBins.forEach(bin => { datalist.innerHTML += `<option value="${bin}">`; });
        }

        function openActionPanel(rackId, binNum, levelNum, itemId, mode) {
            const panel = document.getElementById('actionPanel');
            const content = document.getElementById('panelContent');
            const item = warehouseData[rackId].bins[binNum].levels[levelNum].find(i => i.id === itemId);
            panel.classList.add('active');
            if(mode === 'issuing') {
                document.getElementById('panelTitle').innerText = "📦 Outbound Issuing";
                content.innerHTML = `
                    <div class="bin-card" style="width:100%; cursor:default; border-left:5px solid var(--neon-red)">
                        <p>SKU: <b>${item.itemCode}</b></p>
                        <p>Available: <b style="color:var(--success-green)">${item.qty}</b></p>
                    </div>
                    <div class="dispatch-container">
                        <button class="btn-dispatch btn-partial" onclick="processIssuing('${rackId}','${binNum}','${levelNum}',${item.id},'partial')">Partial Issue</button>
                        <button class="btn-dispatch btn-full" onclick="processIssuing('${rackId}','${binNum}','${levelNum}',${item.id},'full')">Full Issue (Clear)</button>
                    </div>
                `;
            } else {
                document.getElementById('panelTitle').innerText = "⚙️ Bin Data Audit";
                content.innerHTML = `
                    <div class="form-group"><label>Bin Location ID</label><input id="editCode" value="${item.fullCode}"></div>
                    <div class="form-group"><label>SKU / Item Code</label><input id="editItem" value="${item.itemCode}"></div>
                    <div class="form-group"><label>Inventory Qty</label><input id="editQty" type="number" value="${item.qty}"></div>
                    <div class="form-group"><label>PO Number</label><input id="editPur" value="${item.purOrder}"></div>
                    <div class="form-group"><label>Tag / Serial ID</label><input id="editTag" value="${item.tagId}"></div>
                    <div class="form-group"><label>Box ID</label><input id="editBox" value="${item.box}"></div>
                    <div class="form-group"><label>Container ID</label><input id="editCont" value="${item.cont}"></div>
                    <div class="form-group">
                        <label>Item Photo</label>
                        <div style="display:flex; gap:10px; align-items:center">
                            <img src="${item.image}" style="width:50px; height:50px; border-radius:5px; object-fit:cover">
                            <button class="btn" style="background:#dc2626; color:white; font-weight:bold; padding:5px 10px; font-size:10px; border: 1px solid #b91c1c" onclick="deleteImage('${rackId}','${binNum}','${levelNum}',${item.id})">Delete Photo</button>
                            <input type="file" id="editImgInput" style="display:none" accept="image/*" capture="environment" onchange="updateImage('${rackId}','${binNum}','${levelNum}',${item.id})">
                            <button class="btn btn-rack" style="padding:5px 10px; font-size:10px" onclick="document.getElementById('editImgInput').click()">Replace</button>
                        </div>
                    </div>
                    <button class="btn btn-rack btn-full" onclick="processEdit('${rackId}','${binNum}','${levelNum}',${item.id})">Save Changes</button>
                `;
            }
        }

        function closeActionPanel() { document.getElementById('actionPanel').classList.remove('active'); }

        async function processIssuing(rackId, binNum, levelNum, itemId, type) {
            const levelItems = warehouseData[rackId].bins[binNum].levels[levelNum];
            const idx = levelItems.findIndex(i => i.id === itemId);
            if(type === 'full') {
                // Optimistic UI
                const itemToRemove = levelItems[idx];
                levelItems.splice(idx, 1);
                renderWarehouse();
                closeActionPanel();
                try {
                    if(supabaseClient) await supabaseClient.from('TembacBin').delete().eq('id', itemId);
                } catch (e) { alert("Server error during full issue."); }
            } else {
                const amt = parseInt(prompt("Enter amount to issue:"));
                if(!amt || amt > levelItems[idx].qty) return alert("Invalid amount");
                levelItems[idx].qty -= amt;
                if(levelItems[idx].qty <= 0) levelItems.splice(idx, 1);
                await syncToSupabase(levelItems[idx]);
                renderWarehouse();
                closeActionPanel();
            }
        }

        async function processEdit(rackId, binNum, levelNum, itemId) {
            const item = warehouseData[rackId].bins[binNum].levels[levelNum].find(i => i.id === itemId);
            item.fullCode = document.getElementById('editCode').value;
            item.itemCode = document.getElementById('editItem').value;
            item.qty = parseInt(document.getElementById('editQty').value);
            item.purOrder = document.getElementById('editPur').value;
            item.tagId = document.getElementById('editTag').value;
            item.box = document.getElementById('editBox').value;
            item.cont = document.getElementById('editCont').value;
            await syncToSupabase(item);
            renderWarehouse();
            closeActionPanel();
        }

        async function deleteImage(rackId, binNum, levelNum, itemId) {
            const item = warehouseData[rackId].bins[binNum].levels[levelNum].find(i => i.id === itemId);
            item.image = 'https://via.placeholder.com/150x100?text=No+Image';
            await syncToSupabase(item);
            renderWarehouse();
            closeActionPanel();
        }

        async function updateImage(rackId, binNum, levelNum, itemId) {
            const file = document.getElementById('editImgInput').files[0];
            if(!file) return;
            const item = warehouseData[rackId].bins[binNum].levels[levelNum].find(i => i.id === itemId);
            const newUrl = await uploadImageToCloud(file);
            if(newUrl) {
                item.image = newUrl;
                await syncToSupabase(item);
                renderWarehouse();
                closeActionPanel();
            }
        }

        function debounceFilter() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(smartFilter, 300);
        }

        function smartFilter() {
            const query = document.getElementById('aiFilter').value.toLowerCase();
            const kpiCard = document.getElementById('kpiCard');
            const kpiSum = document.getElementById('kpiSum');
            let total = 0;
            let isItemMatch = false;
            const cards = document.querySelectorAll('.bin-card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                if(text.includes(query)) {
                    card.style.display = 'block';
                    card.classList.add('filtered-item');
                    const itemCode = card.querySelector('.item-value')?.innerText.toLowerCase();
                    if(itemCode && query === itemCode) {
                        isItemMatch = true;
                        total += parseInt(card.getAttribute('data-qty')) || 0;
                    }
                } else {
                    card.style.display = 'none';
                    card.classList.remove('filtered-item');
                }
            });
            if(query && isItemMatch) {
                kpiCard.style.display = 'block';
                kpiSum.innerText = `${total} UNITS`;
            } else {
                kpiCard.style.display = 'none';
            }
        }

        function exportExcel() {
            const dataForExport = [];
            Object.keys(warehouseData).forEach(rackId => {
                const bins = warehouseData[rackId].bins;
                Object.keys(bins).forEach(binNum => {
                    const levels = bins[binNum].levels;
                    Object.keys(levels).forEach(lvlNum => {
                        levels[lvlNum].forEach(item => {
                            dataForExport.push({
                                "Tag ID": item.tagId || '',
                                "SKU": item.itemCode || '',
                                "Stock Qty": Number(item.qty) || 0,
                                "Bin Location": item.fullCode || '',
                                "Box ID": item.box || '',
                                "PO Number": item.purOrder || '',
                                "Container": item.cont || ''
                            });
                        });
                    });
                });
            });
            const ws = XLSX.utils.json_to_sheet(dataForExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "WMS_Inventory_Report");
            XLSX.writeFile(wb, "SmartInventory_Global_Report.xlsx");
        }

        function renderWarehouse() {
            const floor = document.getElementById('warehouseFloor');
            floor.innerHTML = '';
            const fragment = document.createDocumentFragment();

            Object.keys(warehouseData).forEach(rackId => {
                const rackDiv = document.createElement('div');
                rackDiv.className = 'rack-container';
                let binsHtml = '';
                const sortedBins = Object.keys(warehouseData[rackId].bins).sort((a,b) => a-b);
                sortedBins.forEach(binNum => {
                    const binData = warehouseData[rackId].bins[binNum];
                    let levelsHtml = '';
                    const sortedLevels = Object.keys(binData.levels).sort((a,b) => a-b);
                    sortedLevels.forEach(lvl => {
                        const items = binData.levels[lvl];
                        const itemsHtml = items.map(item => `
                            <div class="bin-card" data-qty="${item.qty}">
                                <div class="action-hub">
                                    <button class="hub-btn" title="Audit" onclick="openActionPanel('${rackId}','${binNum}','${lvl}',${item.id},'edit')"><i class="fas fa-pen"></i></button>
                                    <button class="hub-btn" title="Issue" onclick="openActionPanel('${rackId}','${binNum}','${lvl}',${item.id},'issuing')"><i class="fas fa-truck-loading"></i></button>
                                </div>
                                <img src="${item.image}">
                                <div class="bin-header"><span class="bin-code">${item.fullCode}</span></div>
                                <div class="priority-data"><span class="item-label">SKU:</span> <span class="item-value">${item.itemCode || ''}</span></div>
                                <div class="priority-data"><span class="item-label">Stock:</span> <span class="qty-value">${item.qty || 0}</span></div>
                                <div class="priority-data" style="border:none; margin-bottom:10px"><span class="item-label">PO:</span> <span class="item-value" style="font-size:13px">${item.purOrder || ''}</span></div>
                                <div class="bin-footer">
                                    <div class="footer-item">Tag: <b>${item.tagId || ''}</b></div>
                                    <div class="footer-item">Box: <b>${item.box || ''}</b></div>
                                    <div class="footer-item">Cont: <b>${item.cont || ''}</b></div>
                                </div>
                            </div>
                        `).join('');
                        levelsHtml += `<div class="levels-row">${itemsHtml}</div>`;
                    });
                    binsHtml += `
                        <div class="bin-group">
                            <div class="bin-label"><i class="fas fa-map-pin"></i> Bin Slot ${binNum}</div>
                            <div class="levels-row">${levelsHtml}</div>
                        </div>
                    `;
                });
                rackDiv.innerHTML = `
                    <div class="rack-header">
                        <div class="rack-title">${warehouseData[rackId].type.toUpperCase()} <span>${rackId}</span></div>
                        <div class="btn-delete-rack" onclick="deleteRack('${rackId}')"><i class="fas fa-trash"></i> Delete Rack</div>
                    </div>
                    <div class="bins-grid">${binsHtml || '<div style="color:var(--text-dim); text-align:center; width:100%">Rack Empty</div>'}</div>
                `;
                fragment.appendChild(rackDiv);
            });
            floor.appendChild(fragment);
        }
        initApp();
    </script>
</body>
</html>
