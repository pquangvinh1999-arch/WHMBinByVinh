<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DINOv2 Pro Indexer v4.2 - By Vinh</title>
    <script type="module">
        import { AutoModel, AutoImageProcessor, RawImage, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        window.AutoModel = AutoModel; window.AutoImageProcessor = AutoImageProcessor;
        window.RawImage = RawImage; window.env = env;
    </script>
    <style>
        body { font-family: 'Orbitron', sans-serif; background: #050b18; color: white; text-align: center; padding: 50px; }
        .box { border: 2px dashed #00f2ff; padding: 40px; border-radius: 20px; max-width: 600px; margin: auto; background: rgba(0,242,255,0.02); }
        #status { color: #00f2ff; margin-bottom: 20px; font-weight: bold; }
        .btn { background: #00f2ff; color: #000; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        progress { width: 100%; height: 15px; margin-top: 20px; accent-color: #00f2ff; }
        .back-btn { margin-top: 30px; display: inline-block; color: #64748b; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <h1>DINOv2 INDEXER <span style="font-size: 0.5em;">PRO</span></h1>
    <div class="box">
        <div id="status">Khởi tạo hệ thống...</div>
        <div id="model-loading-box" style="display:none">
            <progress id="modelProgressBar" value="0" max="100"></progress>
        </div>
        <input type="file" id="fileInput" webkitdirectory directory multiple disabled hidden onchange="processImages(this.files)">
        <button class="btn" id="selectBtn" onclick="document.getElementById('fileInput').click()">CHỌN THƯ MỤC ẢNH GỐC</button>
        <div id="process-box" style="display:none">
            <progress id="progressBar" value="0"></progress>
        </div>
    </div>
    <a href="https://pquangvinh1999-arch.github.io/Check/" class="back-btn">← QUAY LẠI TRANG CHÍNH</a>

    <script type="module">
        let model, processor;
        async function init() {
            const status = document.getElementById('status');
            const modelBar = document.getElementById('modelProgressBar');
            const loadingBox = document.getElementById('model-loading-box');
            try {
                window.env.allowLocalModels = false; window.env.useBrowserCache = true;
                const progress_callback = (p) => {
                    if (p.status === 'progress') {
                        loadingBox.style.display = 'block';
                        modelBar.value = p.percent;
                        status.innerText = `ĐANG TẢI BỘ NÃO AI: ${p.percent.toFixed(0)}%`;
                    }
                };
                processor = await window.AutoImageProcessor.from_pretrained('Xenova/dinov2-small');
                model = await window.AutoModel.from_pretrained('Xenova/dinov2-small', { quantized: true, progress_callback });
                status.innerText = "✅ AI ĐÃ SẴN SÀNG!";
                loadingBox.style.display = 'none';
                document.getElementById('fileInput').disabled = false;
            } catch (e) { status.innerText = "❌ LỖI KHỞI TẠO"; }
        }

        window.processImages = async (files) => {
            const status = document.getElementById('status');
            const bar = document.getElementById('progressBar');
            const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
            document.getElementById('process-box').style.display = 'block';
            bar.max = imageFiles.length;
            let csv = "id,malieu,vector\n";

            for (let i = 0; i < imageFiles.length; i++) {
                const url = URL.createObjectURL(imageFiles[i]);
                const image = await window.RawImage.fromURL(url);
                const inputs = await processor(image);
                const { last_hidden_state } = await model(inputs);
                const vec = Array.from(last_hidden_state.mean(1).data).join('|');
                csv += `${i+1},${imageFiles[i].name.split('.')[0]},"${vec}"\n`;
                bar.value = i + 1;
                status.innerText = `🔄 ĐANG XỬ LÝ: ${i+1}/${imageFiles.length}`;
                URL.revokeObjectURL(url);
            }
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "database_vinh.csv"; a.click();
            status.innerText = "🎉 HOÀN THÀNH!";
        };
        init();
    </script>
</body>
</html>
